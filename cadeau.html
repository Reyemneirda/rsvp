<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadeau de mariage — Adrien & Alina</title>
    <meta name="robots" content="noindex" />

    <!--
      Page "Participation au cadeau de mariage".
      Coordonnées bancaires renseignées (virement Europe + Israël).
      Référence demandée : "Mariage A&A + votre nom".
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Oswald:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Frank+Ruhl+Libre:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>

      :root {
        --paper: #efe2c6;
        --paper-card: #f6ecd4;
        --teal: #2b5566;
        --teal-deep: #1f4351;
        --gold-deep: #c88f27;
        --terracotta: #c1472a;
        --ink: #33251a;
        --ink-soft: rgba(51, 37, 26, 0.72);
        --line: rgba(51, 37, 26, 0.22);
        --font-script: "Yellowtail", cursive;
        --font-display: "Oswald", sans-serif;
        --font-body: "EB Garamond", serif;
      }
      [dir="rtl"] {
        --font-script: "Frank Ruhl Libre", serif;
        --font-display: "Frank Ruhl Libre", sans-serif;
        --font-body: "Frank Ruhl Libre", serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body);
        color: var(--ink);
        background-color: var(--paper);
        background-image:
          radial-gradient(ellipse at 12% 0%, rgba(43, 85, 102, 0.18) 0%, transparent 45%),
          radial-gradient(ellipse at 100% 28%, rgba(224, 166, 55, 0.22) 0%, transparent 48%),
          radial-gradient(ellipse at 50% 100%, rgba(193, 71, 42, 0.1) 0%, transparent 55%);
        background-attachment: fixed;
        min-height: 100vh; display: flex; flex-direction: column;
      }

      .top-bar { position: fixed; top: 1rem; right: 1.2rem; z-index: 200; display: flex; gap: 0.3rem; }
      [dir="rtl"] .top-bar { right: auto; left: 1.2rem; }
      .lang-btn {
        background: rgba(51, 37, 26, 0.06); border: 1px solid var(--line);
        padding: 0.3rem 0.55rem; font-family: var(--font-display); font-weight: 500; font-size: 0.62rem;
        letter-spacing: 0.08em; color: var(--ink); cursor: pointer; border-radius: 5px; transition: all 0.3s ease;
      }
      .lang-btn:hover, .lang-btn.active { background: var(--teal); color: var(--paper); border-color: var(--teal); }

      main { flex: 1; padding: 7rem 1.5rem 4rem; }
      .wrap { max-width: 640px; margin: 0 auto; }

      .back-link {
        display: inline-block; font-family: var(--font-display); font-weight: 500; font-size: 0.66rem;
        letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal);
        text-decoration: none; margin-bottom: 2rem;
      }
      .back-link:hover { color: var(--terracotta); }

      h1 { font-family: var(--font-script); font-size: clamp(2.8rem, 9vw, 4.4rem); color: var(--terracotta); text-align: center; line-height: 1.05; margin-bottom: 1rem; }
      .intro { font-family: var(--font-body); font-size: 1.2rem; line-height: 1.75; color: var(--ink-soft); text-align: center; margin-bottom: 2.5rem; }
      .divider { display: flex; align-items: center; gap: 1rem; margin: 2rem auto; max-width: 220px; }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
      .divider span { color: var(--gold-deep); }

      .bank-card { background: var(--paper-card); border: 1px solid var(--line); border-radius: 10px; padding: 2rem 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 8px 22px rgba(51, 37, 26, 0.09); }
      .bank-card h2 { font-family: var(--font-script); font-size: 2rem; color: var(--terracotta); margin-bottom: 1.2rem; }
      .bank-row { display: flex; justify-content: space-between; gap: 1rem; font-family: var(--font-body); font-size: 1.15rem; padding: 0.55rem 0; border-bottom: 1px solid var(--line); }
      .bank-row:last-child { border-bottom: none; }
      .bank-row .k { color: var(--teal); font-family: var(--font-display); font-weight: 500; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; align-self: center; }
      .bank-row .v { color: var(--ink); text-align: right; word-break: break-word; }

      .thanks { text-align: center; font-family: var(--font-body); font-style: italic; font-size: 1.35rem; color: var(--terracotta); margin-top: 2.5rem; }

      footer { background: var(--teal-deep); padding: 2.5rem 1.5rem; text-align: center; }
      .footer-credit { font-family: var(--font-display); font-size: 0.66rem; letter-spacing: 0.1em; color: rgba(239, 226, 198, 0.6); }

      @media (max-width: 600px) {
        .bank-row { flex-direction: column; gap: 0.15rem; }
        .bank-row .v { text-align: left; }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">
        FR
      </button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">
        EN
      </button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">
        עב
      </button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">
        РУ
      </button>
    </div>

    <main>
      <div class="wrap">
        <a class="back-link" href="index.html" data-i18n="back">← Retour</a>
        <h1 data-i18n="title"></h1>
        <p class="intro" data-i18n="intro"></p>
        <div class="divider"><span>✦</span></div>

        <!-- ============ VIREMENT EUROPE ============ -->
        <div class="bank-card">
          <h2 data-i18n="sepa_eu"></h2>
          <div class="bank-row">
            <span class="k" data-i18n="k_beneficiary"></span
            ><span class="v">Adrien Thomas Gaston Meyer</span>
          </div>
          <div class="bank-row">
            <span class="k">IBAN</span
            ><span class="v">FR80 2043 3026 26N2 6825 8622 428</span>
          </div>
          <div class="bank-row">
            <span class="k">BIC</span><span class="v">NTSBFRM1XXX</span>
          </div>
          <div class="bank-row">
            <span class="k" data-i18n="k_ref"></span
            ><span class="v" data-i18n="v_ref"></span>
          </div>
        </div>

        <!-- ============ VIREMENT ISRAËL ============ -->
        <div class="bank-card">
          <h2 data-i18n="sepa_il"></h2>
          <div class="bank-row">
            <span class="k" data-i18n="k_beneficiary"></span
            ><span class="v">Meyer Adrien Thomas</span>
          </div>
          <div class="bank-row">
            <span class="k">IBAN</span
            ><span class="v">IL40 0121 7000 0000 0480 252</span>
          </div>
          <div class="bank-row">
            <span class="k">SWIFT</span><span class="v">POALILIT</span>
          </div>
          <div class="bank-row">
            <span class="k" data-i18n="k_ref"></span
            ><span class="v" data-i18n="v_ref"></span>
          </div>
        </div>

        <p class="thanks" data-i18n="thanks"></p>
      </div>
    </main>

    <footer>
      <p class="footer-credit">Adrien & Alina — Tel Aviv 2026</p>
    </footer>

    <script>
      const RTL_LANGS = ["he", "ar"];
      const T = {
        fr: {
          back: "← Retour",
          title: "Participation au cadeau",
          intro:
            "Votre présence est notre plus beau cadeau. Si vous souhaitez tout de même contribuer, voici nos coordonnées.",
          sepa_eu: "Virement (France & Europe)",
          sepa_il: "Virement (Israël)",
          k_beneficiary: "Bénéficiaire",
          k_bank: "Banque",
          k_account: "N° de compte",
          k_ref: "Référence",
          v_ref: "Mariage A&A + votre nom",
          thanks: "Merci du fond du cœur 💛 Adrien & Alina",
        },
        en: {
          back: "← Back",
          title: "Wedding gift",
          intro:
            "Your presence is the greatest gift. If you'd still like to contribute, here are our details.",
          sepa_eu: "Transfer (France & Europe)",
          sepa_il: "Transfer (Israel)",
          k_beneficiary: "Beneficiary",
          k_bank: "Bank",
          k_account: "Account number",
          k_ref: "Reference",
          v_ref: "Wedding A&A + your name",
          thanks: "Thank you from the bottom of our hearts 💛 Adrien & Alina",
        },
        he: {
          back: "→ חזרה",
          title: "השתתפות במתנה",
          intro:
            "הנוכחות שלכם היא המתנה היפה ביותר. אם בכל זאת תרצו לתרום, הנה הפרטים שלנו.",
          sepa_eu: "העברה (צרפת ואירופה)",
          sepa_il: "העברה (ישראל)",
          k_beneficiary: "מוטב",
          k_bank: "בנק",
          k_account: "מספר חשבון",
          k_ref: "אסמכתא",
          v_ref: "חתונה A&A + שמכם",
          thanks: "תודה מעומק הלב 💛 אדריאן ואלינה",
        },
        ru: {
          back: "← Назад",
          title: "Свадебный подарок",
          intro:
            "Ваше присутствие — лучший подарок. Если вы всё же хотите внести вклад, вот наши реквизиты.",
          sepa_eu: "Перевод (Франция и Европа)",
          sepa_il: "Перевод (Израиль)",
          k_beneficiary: "Получатель",
          k_bank: "Банк",
          k_account: "Номер счёта",
          k_ref: "Назначение",
          v_ref: "Свадьба A&A + ваше имя",
          thanks: "Благодарим вас от всего сердца 💛 Адриан и Алина",
        },
      };
      function detectLang() {
        const langs = navigator.languages
          ? navigator.languages.map((l) => l.substring(0, 2))
          : [navigator.language.substring(0, 2)];
        for (const l of langs) if (T[l]) return l;
        return "fr";
      }
      function setLang(lang) {
        const t = T[lang];
        if (!t) return;
        document.documentElement.dir = RTL_LANGS.includes(lang) ? "rtl" : "ltr";
        document.documentElement.lang = lang;
        document.documentElement.setAttribute("data-lang", lang);
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const k = el.getAttribute("data-i18n");
          if (t[k]) el.textContent = t[k];
        });
        document
          .querySelectorAll(".lang-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.getAttribute("data-lang") === lang),
          );
      }
      setLang(detectLang());
    </script>
  </body>
</html>

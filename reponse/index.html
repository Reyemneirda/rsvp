    <style>

      /* ============================================= */
      /*   🎬 THÈME VINTAGE — AFFICHE « TEL AVIV »     */
      /* ============================================= */
      :root {
        --paper: #efe2c6;
        --paper-2: #e7d4ac;
        --paper-card: #f6ecd4;
        --teal: #2b5566;
        --teal-deep: #1f4351;
        --gold: #e0a637;
        --gold-deep: #c88f27;
        --terracotta: #c1472a;
        --terracotta-deep: #a63a20;
        --ink: #33251a;
        --ink-soft: rgba(51, 37, 26, 0.72);
        --line: rgba(51, 37, 26, 0.22);
        --error: #a63a20;
        --success: #2f7d34;

        --font-script: "Yellowtail", cursive;
        --font-display: "Oswald", sans-serif;
        --font-body: "EB Garamond", serif;
      }
      [dir="rtl"] {
        --font-script: "Frank Ruhl Libre", serif;
        --font-display: "Frank Ruhl Libre", sans-serif;
        --font-body: "Frank Ruhl Libre", serif;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        font-family: var(--font-body);
        color: var(--ink);
        background-color: var(--paper);
        background-image:
          radial-gradient(ellipse at 12% 0%, rgba(43, 85, 102, 0.18) 0%, transparent 45%),
          radial-gradient(ellipse at 100% 28%, rgba(224, 166, 55, 0.22) 0%, transparent 48%),
          radial-gradient(ellipse at 50% 100%, rgba(193, 71, 42, 0.1) 0%, transparent 55%);
        background-attachment: fixed;
        min-height: 100vh; overflow-x: hidden; -webkit-overflow-scrolling: touch;
      }
      img { max-width: 100%; display: block; }

      /* ============== BARRE FIXE ============== */
      .top-bar {
        position: fixed; top: 1rem; right: 1.2rem; z-index: 200;
        display: flex; align-items: center; gap: 0.5rem;
      }
      [dir="rtl"] .top-bar { right: auto; left: 1.2rem; }
      .music-btn {
        background: var(--terracotta); border: none;
        width: 38px; height: 38px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; border-radius: 50%;
        color: var(--paper); font-size: 0.95rem;
        box-shadow: 0 2px 10px rgba(51, 37, 26, 0.35);
        transition: transform 0.3s ease;
      }
      .music-btn:hover { transform: scale(1.1); }
      .lang-switcher { display: flex; gap: 0.3rem; }
      .lang-btn {
        background: rgba(51, 37, 26, 0.06);
        border: 1px solid var(--line);
        padding: 0.3rem 0.55rem;
        font-family: var(--font-display); font-weight: 500; font-size: 0.62rem;
        letter-spacing: 0.08em; color: var(--ink);
        cursor: pointer; border-radius: 5px; transition: all 0.3s ease;
      }
      .lang-btn:hover, .lang-btn.active { background: var(--teal); color: var(--paper); border-color: var(--teal); }

      /* ============== SECTIONS ============== */
      section { position: relative; padding: 5.5rem 1.5rem; }
      .wrap { max-width: 1040px; margin: 0 auto; }
      .wrap-narrow { max-width: 680px; margin: 0 auto; }
      .section-alt { background: var(--paper-2); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }

      .eyebrow {
        font-family: var(--font-display); font-weight: 500; font-size: 0.72rem;
        letter-spacing: 0.34em; text-transform: uppercase;
        color: var(--teal); text-align: center;
      }
      .h-section {
        font-family: var(--font-script);
        font-size: clamp(2.8rem, 7vw, 4.4rem);
        color: var(--terracotta); text-align: center; margin-bottom: 1.4rem; line-height: 1;
      }
      .lede {
        font-family: var(--font-body); font-size: 1.2rem; line-height: 1.75;
        color: var(--ink-soft); text-align: center;
        max-width: 600px; margin: 0 auto;
      }
      .divider {
        display: flex; align-items: center; gap: 1rem;
        margin: 1.6rem auto; max-width: 220px;
      }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
      .divider span { color: var(--gold-deep); font-size: 1rem; }

      /* ============== HERO (affiche) ============== */
      .hero {
        min-height: 100vh; min-height: 100dvh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
        padding-top: 5.5rem; padding-bottom: 3rem;
      }
      .hero-eyebrow {
        font-family: var(--font-display); font-weight: 400; font-size: 0.72rem;
        letter-spacing: 0.2em; text-transform: uppercase;
        color: var(--teal); max-width: 520px; line-height: 2;
        margin-bottom: 1.6rem; animation: fadeUp 1s ease-out 0.2s both;
      }
      .poster-frame {
        max-width: 372px; margin: 0 auto; padding: 11px;
        background: #f8efd9; border: 1px solid rgba(51, 37, 26, 0.18);
        box-shadow: 0 22px 55px rgba(51, 37, 26, 0.4);
        border-radius: 2px; transform: rotate(-1.2deg);
        animation: fadeUp 1.1s ease-out 0.35s both;
      }
      .poster-img { width: 100%; border: 1px solid rgba(51, 37, 26, 0.12); }
      .hero-date {
        font-family: var(--font-display); font-weight: 500; font-size: 1.05rem;
        letter-spacing: 0.28em; text-transform: uppercase; margin-top: 1.5rem; color: var(--ink);
        animation: fadeUp 1s ease-out 0.6s both;
      }
      .hero-venue {
        font-family: var(--font-body); font-style: italic; font-size: 1.25rem;
        color: var(--ink-soft); margin-top: 0.5rem;
        animation: fadeUp 1s ease-out 0.7s both;
      }
      .countdown {
        display: flex; justify-content: center; gap: 1.6rem; margin-top: 1.6rem;
        animation: fadeUp 1s ease-out 0.9s both;
      }
      .cd-num { font-family: var(--font-script); font-size: 2.6rem; line-height: 1; color: var(--terracotta); }
      .cd-label {
        font-family: var(--font-display); font-weight: 400; font-size: 0.58rem;
        letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--ink-soft); margin-top: 0.4rem;
      }
      .scroll-hint {
        margin-top: 1.5rem; display: flex; flex-direction: column;
        align-items: center; gap: 0.6rem; cursor: pointer;
        animation: fadeUp 1s ease-out 1.1s both;
      }
      .scroll-hint span {
        font-family: var(--font-display); font-size: 0.62rem;
        letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft);
        max-width: 260px; text-align: center; line-height: 1.7;
      }
      .scroll-arrow {
        width: 16px; height: 16px;
        border-right: 2px solid var(--terracotta); border-bottom: 2px solid var(--terracotta);
        transform: rotate(45deg); animation: bounce 2s ease-in-out infinite;
      }
      @keyframes bounce {
        0%, 100% { transform: rotate(45deg) translateY(0); opacity: 1; }
        50% { transform: rotate(45deg) translateY(7px); opacity: 0.5; }
      }
      .hero-actions {
        display: flex; flex-wrap: wrap; justify-content: center; gap: 0.9rem;
        margin-top: 1.5rem; animation: fadeUp 1s ease-out 1s both;
      }
      .hero-btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.9rem 2rem;
        font-family: var(--font-display); font-weight: 500; font-size: 0.74rem;
        letter-spacing: 0.16em; text-transform: uppercase;
        text-decoration: none; border-radius: 4px;
        transition: transform 0.25s ease, background 0.25s ease;
      }
      .hero-btn-solid { color: var(--paper); background: var(--terracotta); border: 1px solid var(--terracotta); }
      .hero-btn-solid:hover { background: var(--terracotta-deep); transform: translateY(-3px); }
      .hero-btn-ghost { color: var(--teal); background: transparent; border: 1px solid var(--teal); }
      .hero-btn-ghost:hover { background: var(--teal); color: var(--paper); transform: translateY(-3px); }

      /* ============== PROGRAMME ============== */
      .timeline { max-width: 620px; margin: 2.5rem auto 0; position: relative; }
      .tl-item {
        display: grid; grid-template-columns: 90px 1fr; gap: 1.2rem;
        padding: 1.1rem 0; border-bottom: 1px solid var(--line);
      }
      .tl-item:last-child { border-bottom: none; }
      .tl-time { font-family: var(--font-script); font-size: 1.9rem; color: var(--terracotta); line-height: 1; padding-top: 0.1rem; }
      [dir="rtl"] .tl-item { grid-template-columns: 1fr 90px; }
      .tl-title {
        font-family: var(--font-display); font-weight: 500; font-size: 1.12rem;
        text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink); margin-bottom: 0.25rem;
      }
      .tl-desc { font-family: var(--font-body); font-size: 1.12rem; color: var(--ink-soft); }

      /* ============== LIEU ============== */
      .venue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: center; margin-top: 2.5rem; }
      .venue-text p { font-family: var(--font-body); font-size: 1.22rem; line-height: 1.8; color: var(--ink); margin-bottom: 0.4rem; }
      .bullet {
        display: flex; gap: 0.7rem; align-items: baseline; margin-top: 1.1rem;
        font-family: var(--font-body); font-size: 1.14rem; color: var(--ink-soft);
      }
      .bullet .ic { color: var(--terracotta); font-size: 0.85rem; flex-shrink: 0; }
      .bullet a { color: var(--teal); border-bottom: 1px solid var(--line); text-decoration: none; }
      .bullet a:hover { border-color: var(--teal); }
      .map-frame iframe { width: 100%; height: 320px; border: 1px solid var(--line); border-radius: 8px; filter: sepia(0.25) saturate(0.9); }
      .nav-buttons { display: flex; gap: 0.8rem; margin-top: 1.3rem; }
      .nav-btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.7rem 1.3rem; border-radius: 4px;
        font-family: var(--font-display); font-weight: 500; font-size: 0.72rem;
        letter-spacing: 0.1em; text-transform: uppercase;
        text-decoration: none; color: var(--paper); background: var(--teal);
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .nav-btn:hover { transform: translateY(-3px); background: var(--teal-deep); }
      .nav-btn svg { width: 18px; height: 18px; }

      /* ============== HÉBERGEMENT ============== */
      .area-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2.5rem; }
      .area-card {
        background: var(--paper-card); border: 1px solid var(--line); border-radius: 8px;
        padding: 1.5rem 1.4rem; box-shadow: 0 6px 18px rgba(51, 37, 26, 0.08);
      }
      .area-card h3 { font-family: var(--font-script); font-size: 2rem; color: var(--terracotta); margin-bottom: 0.2rem; }
      .area-dist {
        font-family: var(--font-display); font-weight: 500; font-size: 0.6rem;
        letter-spacing: 0.15em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.7rem;
      }
      .area-card p { font-family: var(--font-body); font-size: 1.12rem; line-height: 1.55; color: var(--ink-soft); }
      .area-note { font-family: var(--font-body); font-style: italic; font-size: 1.12rem; color: var(--ink-soft); text-align: center; margin-top: 1.8rem; }
      .area-note a { color: var(--teal); border-bottom: 1px solid var(--line); text-decoration: none; }

      /* ============== INFOS PRATIQUES ============== */
      .tips-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2.5rem; }
      .tip { display: flex; gap: 1rem; align-items: flex-start; }
      .tip .tip-ic { font-size: 1.6rem; flex-shrink: 0; line-height: 1.2; }
      .tip h4 {
        font-family: var(--font-display); font-weight: 500; font-size: 1.05rem;
        text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink); margin-bottom: 0.25rem;
      }
      .tip p { font-family: var(--font-body); font-size: 1.12rem; line-height: 1.5; color: var(--ink-soft); }
      .tip a { color: var(--teal); border-bottom: 1px solid var(--line); text-decoration: none; }

      /* ============== FORMULAIRE ============== */
      .rsvp-card {
        max-width: 640px; margin: 2.5rem auto 0;
        background: var(--paper-card); border: 1px solid var(--line); border-radius: 10px;
        padding: 2.5rem 2.2rem; box-shadow: 0 12px 30px rgba(51, 37, 26, 0.1);
      }
      .form-group { margin-bottom: 1.4rem; text-align: left; }
      [dir="rtl"] .form-group { text-align: right; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .form-label {
        display: block; font-family: var(--font-display); font-weight: 500; font-size: 0.66rem;
        letter-spacing: 0.16em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.5rem;
      }
      .form-input, .form-textarea {
        width: 100%; padding: 0.8rem 1rem;
        font-family: var(--font-body); font-size: 1.05rem; color: var(--ink);
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid var(--line); border-radius: 5px; outline: none;
        transition: border-color 0.3s ease; -webkit-appearance: none; appearance: none;
      }
      .form-input::placeholder { color: rgba(51, 37, 26, 0.4); }
      .form-input:focus, .form-textarea:focus { border-color: var(--terracotta); }
      .form-textarea { resize: vertical; min-height: 80px; }
      .comes-toggle { display: flex; gap: 0.6rem; margin-top: 0.3rem; }
      .comes-btn {
        flex: 1; padding: 0.85rem 0.8rem;
        font-family: var(--font-display); font-weight: 500; font-size: 0.85rem;
        border: 1px solid var(--line); border-radius: 5px;
        background: rgba(255, 255, 255, 0.4); color: var(--ink-soft);
        cursor: pointer; transition: all 0.3s ease;
      }
      .comes-btn:hover { border-color: var(--terracotta); color: var(--ink); }
      .comes-btn.active { background: var(--terracotta); border-color: var(--terracotta); color: var(--paper); }
      .comes-hint { font-family: var(--font-body); font-style: italic; font-size: 1rem; color: var(--ink-soft); margin-top: 0.6rem; }
      .checkbox-group { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.4rem; }
      [dir="rtl"] .checkbox-group { flex-direction: row-reverse; }
      .form-checkbox { width: 18px; height: 18px; accent-color: var(--terracotta); cursor: pointer; flex-shrink: 0; }
      .checkbox-label { font-family: var(--font-body); font-size: 1.05rem; color: var(--ink); cursor: pointer; }
      .form-hint { display: block; font-family: var(--font-body); font-style: italic; font-size: 0.95rem; color: var(--ink-soft); margin-top: 0.35rem; }
      #comes-details { transition: opacity 0.3s ease, max-height 0.3s ease; overflow: hidden; }
      #comes-details.hidden { opacity: 0; max-height: 0; margin: 0; pointer-events: none; }
      .yn-count { margin-top: 0.8rem; }
      .yn-count.hidden { display: none; }
      .btn-primary {
        display: inline-block; margin-top: 0.6rem; padding: 0.95rem 3rem;
        font-family: var(--font-display); font-weight: 600; font-size: 0.78rem;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--paper); background: var(--terracotta);
        border: none; border-radius: 5px; cursor: pointer;
        transition: transform 0.25s ease, background 0.25s ease;
      }
      .btn-primary:hover:not(:disabled) { transform: translateY(-3px); background: var(--terracotta-deep); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .form-status { margin-top: 1.2rem; font-family: var(--font-display); font-size: 0.85rem; min-height: 1.4em; }
      .form-status.sending { color: var(--ink-soft); }
      .form-status.success { color: var(--success); }
      .form-status.error { color: var(--error); }
      .success-message { display: none; text-align: center; padding: 1.5rem 0; }
      .success-message.visible { display: block; }
      .success-icon { font-size: 2.4rem; color: var(--gold-deep); margin-bottom: 1rem; }
      .success-text { font-family: var(--font-script); font-size: 2.4rem; color: var(--terracotta); margin-bottom: 0.5rem; }
      .success-sub { font-family: var(--font-body); font-size: 1.1rem; color: var(--ink-soft); line-height: 1.6; }
      .success-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.9rem; margin-top: 1.8rem; }

      /* ============== CADEAU ============== */
      .gift-cta { text-align: center; }
      .btn-outline {
        display: inline-block; margin-top: 1.6rem; padding: 0.95rem 2.8rem;
        font-family: var(--font-display); font-weight: 500; font-size: 0.74rem;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--teal); background: transparent;
        border: 1px solid var(--teal); border-radius: 5px;
        text-decoration: none; transition: all 0.25s ease;
      }
      .btn-outline:hover { background: var(--teal); color: var(--paper); transform: translateY(-3px); }

      /* ============== FOOTER ============== */
      footer { background: var(--teal-deep); padding: 4rem 1.5rem 2.5rem; color: var(--paper); }
      .footer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; max-width: 900px; margin: 0 auto; text-align: center; }
      .footer-grid h4 { font-family: var(--font-script); font-size: 1.9rem; color: var(--gold); margin-bottom: 1rem; }
      .footer-grid p, .footer-grid a {
        font-family: var(--font-body); font-size: 1.12rem;
        color: rgba(239, 226, 198, 0.82); text-decoration: none; line-height: 1.7; display: block;
      }
      .footer-grid a:hover { color: var(--paper); }
      .footer-credit {
        text-align: center; margin-top: 3rem;
        font-family: var(--font-display); font-size: 0.66rem;
        letter-spacing: 0.1em; color: rgba(239, 226, 198, 0.5);
      }

      /* ============== ANIMATIONS ============== */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
      .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s ease, transform 0.9s ease; }
      .reveal.in { opacity: 1; transform: translateY(0); }

      /* ============== RESPONSIVE ============== */
      @media (max-width: 760px) {
        section { padding: 4rem 1.3rem; }
        .venue-grid, .area-grid, .tips-grid { grid-template-columns: 1fr; gap: 1.6rem; }
        .form-row { grid-template-columns: 1fr; }
        .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
        .countdown { gap: 1.1rem; }
        .cd-num { font-size: 2.1rem; }
        .rsvp-card { padding: 2rem 1.3rem; }
        .nav-buttons { flex-wrap: wrap; }
        .tl-item { grid-template-columns: 70px 1fr; gap: 0.9rem; }
        [dir="rtl"] .tl-item { grid-template-columns: 1fr 70px; }
        .tl-time { font-size: 1.5rem; }
        .poster-frame { max-width: 300px; }
      }
          /* Page /reponse/ : hero 2 colonnes, réduit pour montrer vite le formulaire */
      .hero { min-height: auto !important; padding-top: 5rem; padding-bottom: 1.5rem; }
      .hero-split { display: flex; align-items: center; justify-content: center; gap: 2.8rem; flex-wrap: wrap; }
      .hero-poster .poster-frame { margin: 0; max-width: 300px; padding: 9px; }
      .hero-copy { text-align: left; max-width: 340px; }
      [dir="rtl"] .hero-copy { text-align: right; }
      .hero-copy .hero-eyebrow { max-width: none; margin: 0 0 1rem; font-size: 0.64rem; line-height: 1.9; }
      .hero-copy .hero-date { margin: 0; font-size: 1rem; }
      .hero-copy .hero-venue { margin: 0.5rem 0 0; font-size: 1.15rem; }
      .countdown { display: none; }
      #rsvp { padding-top: 1.5rem; }
      @media (max-width: 760px) {
        .hero-split { flex-direction: column; gap: 1.3rem; }
        .hero-copy { text-align: center; max-width: 100%; }
        .hero-poster .poster-frame { max-width: 250px; }
      }
    </style>

  <body>
    <!-- Barre fixe : musique + langue -->
    <div class="top-bar">
      <button class="music-btn" id="music-btn" onclick="toggleMusic()" aria-label="Musique">▶</button>
      <nav class="lang-switcher" aria-label="Langue">
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
        <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">РУ</button>
      </nav>
    </div>
    <audio id="bg-music" src="../music.mp3" loop preload="auto"></audio>

    <!-- ============================ HERO ============================ -->
    <section class="hero" id="hero">

      /* ==========================================================
       *  ⚙️ LOGIQUE
       * ========================================================== */
      const RTL_LANGS = ["he", "ar"];
      let currentLang = "fr";

      function detectLang() {
        const langs = navigator.languages
          ? navigator.languages.map((l) => l.substring(0, 2))
          : [navigator.language.substring(0, 2)];
        const supported = Object.keys(TRANSLATIONS);
        for (const l of langs) if (supported.includes(l)) return l;
        return "fr";
      }

      /* ---------- Musique ---------- */
      const bgMusic = document.getElementById("bg-music");
      const musicBtn = document.getElementById("music-btn");
      function startMusic() {
        if (bgMusic.paused) {
          bgMusic.play().then(() => { musicBtn.textContent = "⏸"; }).catch(() => {});
        }
      }
      function autoplayOnce() {
        startMusic();
        document.removeEventListener("click", autoplayOnce);
        document.removeEventListener("touchstart", autoplayOnce);
        document.removeEventListener("scroll", autoplayOnce);
      }
      document.addEventListener("click", autoplayOnce, { once: true });
      document.addEventListener("touchstart", autoplayOnce, { once: true });
      document.addEventListener("scroll", autoplayOnce, { once: true });
      function toggleMusic() {
        if (bgMusic.paused) { bgMusic.play(); musicBtn.textContent = "⏸"; }
        else { bgMusic.pause(); musicBtn.textContent = "▶"; }
      }

      /* Coupe la musique quand on quitte l'onglet/la page ; reprend au retour si elle jouait. */
      let musicWasPlaying = false;
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          musicWasPlaying = !bgMusic.paused;
          if (musicWasPlaying) { bgMusic.pause(); musicBtn.textContent = "▶"; }
        } else if (musicWasPlaying) {
          bgMusic.play().then(() => { musicBtn.textContent = "⏸"; }).catch(() => {});
        }
      });

      /* ---------- Langue ---------- */
      function setLang(lang) {
        const t = TRANSLATIONS[lang];
        if (!t) return;
        currentLang = lang;
        const isRTL = RTL_LANGS.includes(lang);
        document.documentElement.dir = isRTL ? "rtl" : "ltr";
        document.documentElement.lang = lang;
        document.documentElement.setAttribute("data-lang", lang);

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (t[key]) el.innerHTML = t[key].replace(/\n/g, "<br>");
        });

        const heroNames = document.getElementById("hero-names");
        if (heroNames)
          heroNames.innerHTML = `${t.name1}<span class="amp">&</span>${t.name2}`;
        document.title = `Mariage ${t.name1} & ${t.name2}`;

        document.querySelectorAll(".lang-btn").forEach((b) =>
          b.classList.toggle("active", b.getAttribute("data-lang") === lang)
        );
        updateCountdown();
      }

      /* ---------- Countdown ---------- */
      function updateCountdown() {
        const diff = Math.max(0, WEDDING_DATE - new Date());
        const t = TRANSLATIONS[currentLang];
        const units = [
          { v: Math.floor(diff / 86400000), l: t.days },
          { v: Math.floor((diff / 3600000) % 24), l: t.hours },
          { v: Math.floor((diff / 60000) % 60), l: t.minutes },
          { v: Math.floor((diff / 1000) % 60), l: t.seconds },
        ];
        document.getElementById("countdown").innerHTML = units
          .map((u) => `<div><div class="cd-num">${u.v}</div><div class="cd-label">${u.l}</div></div>`)
          .join("");
      }

      /* ---------- Toggle présence ---------- */
      let comesValue = null;
      function setComes(val) {
        comesValue = val;
        document.getElementById("comes-yes").classList.toggle("active", val === true);
        document.getElementById("comes-no").classList.toggle("active", val === false);
        document.getElementById("comes-details").classList.toggle("hidden", val !== true);
        const hint = document.getElementById("comes-hint");
        if (hint) hint.style.display = val === null ? "" : "none";
      }

      /* ---------- Toggles Oui/Non (accompagnant·e / enfants / parking) ---------- */
      const ynState = { plusone: false, children: false, parking: false };
      function setYN(key, val) {
        ynState[key] = val;
        const yes = document.getElementById(key + "-yes");
        const no = document.getElementById(key + "-no");
        if (yes) yes.classList.toggle("active", val === true);
        if (no) no.classList.toggle("active", val === false);
        const countWrap = document.getElementById(key + "-count-wrap");
        if (countWrap) countWrap.classList.toggle("hidden", val !== true);
      }

      /* ---------- Pré-remplissage ---------- */
      let prefillPhone = "";
      let prefillTg = "";

      /* ---------- Envoi RSVP (même payload que le save-the-date) ---------- */
      async function submitRSVP() {
        const t = TRANSLATIONS[currentLang];
        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("form-status");

        const firstName = document.getElementById("field-firstName").value.trim();
        const lastName = document.getElementById("field-lastName").value.trim();
        const comes = comesValue;
        const email = comes ? document.getElementById("field-email").value.trim() : "";
        const plusOne = comes ? ynState.plusone : false;
        const children = comes ? ynState.children : false;
        const parking = comes ? ynState.parking : false;
        const plusOneCount = plusOne
          ? parseInt(document.getElementById("field-plusone-count").value, 10) || 0
          : 0;
        const childrenCount = children
          ? parseInt(document.getElementById("field-children-count").value, 10) || 0
          : 0;
        const guests = plusOne ? (plusOneCount > 0 ? plusOneCount : 1) : 0;
        const notes = document.getElementById("field-notes").value.trim();

        if (!firstName || !lastName) {
          status.textContent = t.error_name;
          status.className = "form-status error";
          return;
        }
        if (comesValue === null) {
          status.textContent = t.error_comes;
          status.className = "form-status error";
          return;
        }

        btn.disabled = true;
        status.textContent = t.sending;
        status.className = "form-status sending";

        const payload = {
          firstName, lastName, comes, email, plusOne, children, parking,
          plusOneCount, childrenCount, guests, notes, message: notes,
          lang: currentLang, phone: prefillPhone, tg: prefillTg,
        };

        try {
          if (!APPS_SCRIPT_URL) {
            console.log("📋 Mode démo — RSVP:", payload);
            await new Promise((r) => setTimeout(r, 700));
          } else {
            await fetch(APPS_SCRIPT_URL, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
          }

          const t2 = TRANSLATIONS[currentLang];
          const title = document.querySelector("#success-message .success-text");
          const sub = document.querySelector("#success-message .success-sub");
          if (comesValue) {
            title.innerHTML = t2.success_title;
            sub.innerHTML = (t2.success_sub || "").replace(/\n/g, "<br>");
          } else {
            title.innerHTML = t2.success_title_no || t2.success_title;
            sub.innerHTML = (t2.success_sub_no || t2.success_sub || "").replace(/\n/g, "<br>");
          }
          document.getElementById("rsvp-form-wrapper").style.display = "none";
          document.getElementById("success-message").classList.add("visible");
        } catch (err) {
          console.error("Erreur RSVP:", err);
          status.textContent = t.error;
          status.className = "form-status error";
          btn.disabled = false;
        }
      }

      /* ---------- Reveal au scroll ---------- */
      const io = new IntersectionObserver(
        (entries) => entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add("in"); }),
        { threshold: 0.12 }
      );
      document.querySelectorAll(".reveal").forEach((el) => io.observe(el));

      /* ---------- Démarrage ---------- */
      setLang(detectLang());
      ["plusone", "children", "parking"].forEach((k) => setYN(k, false));
      setInterval(updateCountdown, 1000);

      /* Pré-remplissage via URL ?p= (téléphone) ou ?t= (telegram) */
      (async function prefillFromURL() {
        const params = new URLSearchParams(window.location.search);
        const phone = params.get("p");
        const tgUser = params.get("t");
        prefillPhone = phone || "";
        prefillTg = tgUser || "";
        if ((!phone && !tgUser) || !APPS_SCRIPT_URL) return;
        try {
          let url = APPS_SCRIPT_URL;
          if (phone) url += "?p=" + encodeURIComponent(phone);
          else if (tgUser) url += "?t=" + encodeURIComponent(tgUser);
          const resp = await fetch(url);
          const data = await resp.json();
          if (data.found) {
            const fn = document.getElementById("field-firstName");
            const ln = document.getElementById("field-lastName");
            const em = document.getElementById("field-email");
            if (fn) fn.value = data.firstName || "";
            if (ln) ln.value = data.lastName || "";
            if (em) em.value = data.email || "";
          }
        } catch (err) {
          console.warn("Prefill échoué:", err);
        }
      })();
    </script>
